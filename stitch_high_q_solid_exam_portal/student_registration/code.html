        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopNavBar (Medium Variant - Content Filter applied: Hidden on transactional page) -->
<header class="bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-on-primary-fixed-variant flex justify-between items-center w-full px-margin-desktop h-20 max-w-container-max mx-auto">
<div class="text-title-md font-title-md font-bold text-primary dark:text-primary-fixed">HIGH-Q Solid Academy</div>
<div class="hidden md:flex gap-8 items-center">
<nav class="flex gap-6">
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors font-title-md text-title-md" href="#">Home</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors font-title-md text-title-md" href="#">Programs</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors font-title-md text-title-md" href="#">Pricing</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors font-title-md text-title-md" href="#">About</a>
</nav>
<button class="bg-primary text-on-primary px-6 py-2 rounded-lg font-title-md text-title-md hover:opacity-80 transition-opacity">Login</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile py-stack-lg">
<div class="w-full max-w-[560px] bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_4px_12px_rgba(10,25,47,0.05)] overflow-hidden">
<!-- Hero Header Section in Card -->
<div class="relative h-32 w-full bg-primary-container overflow-hidden">
<img class="w-full h-full object-cover opacity-30" data-alt="A sophisticated close-up of high-quality academic stationary and a sleek modern laptop on a dark navy oak desk. The scene is illuminated by soft, focused light creating an atmosphere of prestigious scholarly pursuit and focused intellectual rigor. The color palette is dominated by deep blues and crisp whites, echoing a corporate and modern educational aesthetic with clean lines." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBESnu3QE-Imry4plVVUMP__DbN4E-Zo0GYlmvNCeMBSklhR-Ain5cN1Eei-iYotQ51bxjgWzb-Y55ekDKxZWr6jsgd3X9EHT4H2lrZH6OSHDiP7I12QR6_fg-fPgKZPCE-CDZElumLPZdWJKhv9I8e57vJhOVAU6AfHBkhAiMJHYXlFkC3CKM1USUFMl4Zqb1ZVYS4A7zlT-aaPxFLVra4M51K8f-kEsx32Qv0cmVbhSJ1OoGqOLPHT80yDyLhdiZYwQB8BK8MnQ"/>
<div class="absolute inset-0 flex flex-col items-center justify-center text-on-primary">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary-fixed">Student Registration</h1>
<p class="font-label-md text-label-md text-on-primary-container">Join the elite academic community at HIGH-Q</p>
</div>
</div>
<!-- Form Content -->
<div class="p-8 md:p-12">
<form class="space-y-6">
<!-- Name Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all text-body-md font-body-md outline-none" placeholder="Enter your full legal name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all text-body-md font-body-md outline-none" placeholder="student@example.edu" type="email"/>
</div>
</div>
<!-- Phone and Class Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="call">call</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all text-body-md font-body-md outline-none" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant">Student Category/Class</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="school">school</span>
<select class="w-full h-12 pl-10 pr-4 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all text-body-md font-body-md outline-none appearance-none">
<option disabled="" selected="" value="">Select Class</option>
<option>Senior Secondary 1</option>
<option>Senior Secondary 2</option>
<option>Senior Secondary 3</option>
<option>Undergraduate</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all text-body-md font-body-md outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="shield">shield</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all text-body-md font-body-md outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full h-14 bg-error text-on-error font-title-md text-title-md rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Register Now</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Login Link -->
<div class="text-center pt-2">
<p class="font-body-md text-body-md text-on-surface-variant">
                            Already have an account? 
                            <a class="text-primary font-bold hover:underline" href="#">Login here</a>
</p>
</div>
</form>
</div>
<!-- Trust Footer -->
<div class="bg-surface-container-low p-6 border-t border-outline-variant flex items-center justify-center gap-6">
<div class="flex items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-[20px]" data-icon="verified_user">verified_user</span>
<span class="text-label-sm font-label-sm">Secure Data</span>
</div>
<div class="flex items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-[20px]" data-icon="gpp_good">gpp_good</span>
<span class="text-label-sm font-label-sm">ISO Certified</span>
</div>
</div>
</div>
</main>
<!-- Content Filtered: BottomNavBar suppressed on transactional registration page -->
</body></html>
